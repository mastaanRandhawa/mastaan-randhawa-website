# Deploy Vite app from folder app-root to GitHub Pages (custom domain: mastaanrandhawa.com)
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: app-root
        run: npm ci

      - name: Build
        working-directory: app-root
        run: npm run build
        env:
          BASE_PATH: ""

      - name: Add CNAME for custom domain
        working-directory: app-root/dist
        run: |
          if [ -f ../CNAME ]; then cp ../CNAME .; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app-root/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
